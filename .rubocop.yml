require: rubocop-rspec

AllCops:
  NewCops: enable
  SuggestExtensions: true
  DisplayCopNames: true
  TargetRubyVersion: 3.2.1
  Exclude:
    - 'bin/*'
    - 'spec/acceptance/fixtures/**/*'
    - 'spec/unit/fixtures/**/*'
    - 'vendor/gems/**/*'
    - '.github/**/*'

Style/HashSyntax:
  Enabled: false

Style/StringLiterals:
  Enabled: false

RSpec/ContextWording:
  Enabled: false
