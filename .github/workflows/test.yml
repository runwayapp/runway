name: test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: fetch ruby version
        id: ruby-version
        run: |
          version=$(cat .ruby-version)
          echo "version=${version}" >> $GITHUB_OUTPUT

      - uses: ruby/setup-ruby@6cecb48364174b0952995175c55f9bf5527e6682 # pin@v1.147.0
        with:
          ruby-version: ${{ steps.ruby-version.outputs.version }}
          bundler-cache: true

      - name: test
        run: script/test -k
