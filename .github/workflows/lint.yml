name: lint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: fetch ruby version
        id: ruby-version
        run: |
          version=$(cat .ruby-version)
          echo "version=${version}" >> $GITHUB_OUTPUT

      - uses: ruby/setup-ruby@250fcd6a742febb1123a77a841497ccaa8b9e939 # pin@v1.152.0
        with:
          ruby-version: ${{ steps.ruby-version.outputs.version }}
          bundler-cache: true

      - name: lint
        run: bundle exec rubocop -c .rubocop.yml src/ spec/
